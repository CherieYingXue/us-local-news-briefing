services:
  - type: web
    name: us-local-news-briefing
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 1 --timeout 300
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
